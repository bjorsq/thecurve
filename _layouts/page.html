---
layout: default
---

		<section class="page-content">
			<header>
				<h2>{{ page.title }}</h2>
				{% if page.featuredimage %}
				<figure class="featuredimage">
					<img src="{{ site.url }}{{site.baseurl }}{{ site.imgpath }}{{ page.featuredimage }}" alt="{{ page.title | escape_once }}">
				</figure>
				{% endif %}
			</header>

			{{ content }}
			
		</section>
